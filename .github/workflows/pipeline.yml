name: Pipeline

# One workflow for the whole lifecycle.
#
# Triggers:
#   - Pull request to main:  run quality-gates only.
#   - Push to main:          quality-gates -> build -> deploy-dev.
#   - Push tag v*.*.*:       quality-gates -> build -> deploy-prod (gated).
#   - workflow_dispatch:     manual override; pick dev or prod.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment to deploy to"
        required: true
        type: choice
        options: [dev, prod]
        default: dev

env:
  GCP_REGION: us-central1
  ARTIFACT_REPO: hooten-young
  IMAGE_NAME: hy-sales-api

jobs:
  quality-gates:
    name: Quality gates (lint · format · types · tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src

      - name: pytest (unit tests only)
        # tests/api/** are DB-integration tests that need a real
        # Postgres reachable at DATABASE_URL.  CI doesn't provision a
        # Postgres service container yet, so we run them locally and
        # exclude them from CI.  TODO: add a postgres service step
        # here, run db/migrations/*.sql against it, then drop the
        # --ignore and run the full suite.
        run: uv run pytest -q --ignore=tests/api
        env:
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"

  build:
    name: Build & push image
    needs: quality-gates
    # Don't build on PRs — only on real pushes / manual dispatches.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        # Image URI deterministically reconstructed from env + github.sha
        # in each job below — no cross-job outputs needed.
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "Pushed $IMAGE"

  deploy-dev:
    name: Deploy to dev
    needs: build
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment: dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Deploy to Cloud Run (dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: hy-sales-api-dev
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          flags: |
            --allow-unauthenticated
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:hy-dev
            --min-instances=0
            --max-instances=4
            --memory=512Mi
            --cpu=1
          env_vars: |-
            APP_ENV=dev
            LOG_LEVEL=INFO
            FRONTEND_RESET_URL=https://ops-dev.hootenyoung.com/auth/reset-password
            SENDGRID_FROM_EMAIL=ops-no-reply@hootenyoung.com
            SENDGRID_FROM_NAME=Hooten Young Ops Platform
          secrets: |-
            DATABASE_URL=DATABASE_URL_DEV:latest
            JWT_SECRET=JWT_SECRET:latest
            SENDGRID_API_KEY=SENDGRID_API_KEY:latest

  deploy-prod:
    name: Deploy to prod
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Deploy to Cloud Run (prod)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: hy-sales-api-prod
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          flags: |
            --allow-unauthenticated
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:hy-prod
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |-
            APP_ENV=prod
            LOG_LEVEL=INFO
            FRONTEND_RESET_URL=https://ops.hootenyoung.com/auth/reset-password
            SENDGRID_FROM_EMAIL=ops-no-reply@hootenyoung.com
            SENDGRID_FROM_NAME=Hooten Young Ops Platform
          secrets: |-
            DATABASE_URL=DATABASE_URL_PROD:latest
            JWT_SECRET=JWT_SECRET:latest
            SENDGRID_API_KEY=SENDGRID_API_KEY:latest
